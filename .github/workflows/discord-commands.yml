name: BossBot Command Center
on:
  repository_dispatch:
    types: [discord_command]

jobs:
  update-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Update Website Intel
        run: |
          # Logic to swap the date in index.html based on Discord input
          sed -i "s/new Date(\".*\")/new Date(\"${{ github.event.client_payload.new_date }}\")/g" index.html
          
      - name: Commit & Push Changes
        run: |
          git config --global user.name "BossBot-HQ"
          git config --global user.email "bot@bossbabes.com"
          git add index.html
          git commit -m "Automated Intel Update from Discord HQ"
          git push
