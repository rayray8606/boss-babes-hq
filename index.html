<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSS BABES | Elite Warzone Operations</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700;800&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Rajdhani', 'sans-serif'],
                        mono: ['Space Mono', 'monospace'],
                    },
                    colors: { neon: '#ff007f', void: '#0a0a0c', surface: '#121216', }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0a0c; color: #ffffff; cursor: none; }
        .glass { background: rgba(18, 18, 22, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 0, 127, 0.2); }
        .neon-glow { text-shadow: 0 0 15px rgba(255, 0, 127, 0.8), 0 0 30px rgba(255, 0, 127, 0.4); }
        .neon-border { box-shadow: 0 0 25px rgba(255, 0, 127, 0.4); border: 1px solid #ff007f; }
        
        #cursor {
            width: 20px; height: 20px; border: 2px solid #ff007f; border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 9999; transition: transform 0.1s;
        }
        #cursor-dot {
            width: 4px; height: 4px; background: #ff007f; border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 9999;
        }

        body::before {
            content: " "; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 9998; background-size: 100% 3px; pointer-events: none; opacity: 0.15;
        }

        .bg-animate {
            background: linear-gradient(270deg, #0a0a0c, #1a0010, #0a0a0c);
            background-size: 400% 400%; animation: gradientShift 15s ease infinite;
        }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body class="antialiased font-sans overflow-x-hidden selection:bg-neon selection:text-white">

    <div id="cursor"></div>
    <div id="cursor-dot"></div>

    <nav class="fixed w-full z-[100] glass px-6 py-4 flex justify-between items-center border-b border-white/5">
        <div class="text-2xl font-extrabold tracking-[0.2em] uppercase text-white">
            Boss<span class="text-neon">Babes</span>
        </div>
        <div class="hidden md:flex space-x-10 font-bold tracking-[0.3em] uppercase text-[10px]">
            <a href="#squad" class="hover:text-neon transition-all">Squad</a>
            <a href="#intel" class="hover:text-neon transition-all">Intel</a>
            <a href="#armory" class="hover:text-neon transition-all">Armory</a>
        </div>
        <a href="https://www.tiktok.com/@omg.lexieee" target="_blank" class="px-6 py-2 bg-neon text-white font-black uppercase tracking-widest text-xs rounded-sm hover:scale-105 transition-all neon-border">
            LIVE NOW
        </a>
    </nav>

    <header class="relative flex flex-col items-center justify-center min-h-screen text-center px-4 bg-animate pt-20">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center opacity-10 mix-blend-color-dodge"></div>
        
        <div class="relative z-10" data-aos="zoom-out" data-aos-duration="1500">
            <div class="font-mono text-neon text-xs tracking-[0.5em] mb-4 uppercase opacity-80">System: Active / Sector: Rebirth</div>
            <h1 class="text-7xl md:text-[10rem] font-black uppercase tracking-tighter leading-none mb-6">
                <span class="text-white">BOSS</span> <br> 
                <span class="text-neon neon-glow italic">BABES</span>
            </h1>
            <p class="text-lg md:text-2xl text-gray-400 mb-12 font-light tracking-[0.4em] uppercase max-w-3xl mx-auto">
                All Boss. All Skill. No Luck. Just Us.
            </p>
            <div class="flex flex-col sm:flex-row gap-8 justify-center items-center">
                <a href="https://www.tiktok.com/@omg.lexieee" target="_blank" class="w-64 py-5 bg-neon text-white font-black text-lg uppercase tracking-widest hover:bg-white hover:text-neon transition-all duration-500 neon-border">
                    Watch Live
                </a>
                <a href="https://discord.gg/DUd86KZjjw" target="_blank" class="w-64 py-5 border border-white/20 text-white font-black text-lg uppercase tracking-widest hover:border-neon hover:text-neon transition-all duration-500 glass">
                    The War Room
                </a>
            </div>
        </div>
    </header>

    <section id="squad" class="py-32 bg-void relative border-y border-white/5">
        <div class="max-w-7xl mx-auto px-6 flex flex-col items-center">
            
            <div class="flex flex-col items-center mb-16 text-center" data-aos="fade-up">
                <h2 class="text-5xl font-black uppercase tracking-widest mb-4">Confirmed Roster</h2>
                <div class="h-1 w-24 bg-neon shadow-[0_0_10px_#ff007f] mb-4"></div>
            </div>

            <div class="relative max-w-3xl rounded-sm p-2 glass neon-border shadow-[0_0_50px_rgba(255,0,127,0.5)]" data-aos="zoom-in">
                <img src="OMG.LEXIEEE.png" alt="Squad Roster" class="w-full h-auto rounded-sm block shadow-2xl">
            </div>

        </div>
    </section>

    <section id="intel" class="py-32 bg-surface text-center overflow-hidden">
        <div data-aos="zoom-in">
            <h3 class="text-5xl md:text-7xl font-black uppercase mb-16">Next Drop In:</h3>
            <div class="flex justify-center gap-4 md:gap-10 text-white">
                <div class="flex flex-col"><span id="days" class="text-6xl md:text-8xl font-black">00</span><span class="text-xs font-mono text-gray-500 uppercase tracking-widest">Days</span></div>
                <div class="text-neon text-6xl md:text-8xl font-black">:</div>
                <div class="flex flex-col"><span id="hours" class="text-6xl md:text-8xl font-black">00</span><span class="text-xs font-mono text-gray-500 uppercase tracking-widest">Hours</span></div>
                <div class="text-neon text-6xl md:text-8xl font-black">:</div>
                <div class="flex flex-col"><span id="minutes" class="text-6xl md:text-8xl font-black">00</span><span class="text-xs font-mono text-gray-500 uppercase tracking-widest">Mins</span></div>
            </div>
        </div>
    </section>

    <footer class="py-12 bg-void text-center border-t border-white/5 font-mono text-[10px] text-gray-600 tracking-[0.5em] uppercase">
        Operation Secured by Slumdawg &copy; 2026
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        const cursor = document.getElementById('cursor');
        const dot = document.getElementById('cursor-dot');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 10 + 'px';
            cursor.style.top = e.clientY - 10 + 'px';
            dot.style.left = e.clientX - 2 + 'px';
            dot.style.top = e.clientY - 2 + 'px';
        });

        const target = new Date("Jun 6, 2026 21:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        }, 1000);
    </script>
</body>
</html>
